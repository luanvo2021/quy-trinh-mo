<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Checklist Pháp lý Cuốn chiếu - Dự án Khoáng sản</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Import Map for Google Generative AI & Firebase -->
    <script type="importmap">
      {
        "imports": {
          "@google/generative-ai": "https://esm.run/@google/generative-ai",
          "firebase/app": "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js",
          "firebase/database": "https://www.gstatic.com/firebasejs/10.9.0/firebase-database.js"
        }
      }
    </script>
</head>
<body>

    <!-- Navbar & Toolbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-navy fixed-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#"><i class="fa-solid fa-clipboard-check me-2"></i>Checklist Khoáng Sản AI</a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#toolbar" aria-controls="toolbar" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="toolbar">
                <div class="d-flex align-items-center flex-grow-1 mx-lg-4 my-2 my-lg-0">
                    <span class="text-white me-2 fw-semibold text-nowrap">Tiến độ:</span>
                    <div class="progress flex-grow-1" style="height: 20px; background-color: rgba(255,255,255,0.2);">
                        <div id="overall-progress" class="progress-bar bg-success progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">0%</div>
                    </div>
                </div>

                <div class="d-flex align-items-center gap-3">
                    <span id="cloud-status" class="badge bg-warning text-dark"><i class="fa-solid fa-cloud-arrow-up"></i> Đang kết nối...</span>
                    <div class="form-check form-switch text-white m-0 d-flex align-items-center">
                        <input class="form-check-input me-2 mt-0" type="checkbox" role="switch" id="bypass-switch" style="cursor: pointer; width: 2.5em; height: 1.25em;">
                        <label class="form-check-label" for="bypass-switch" style="cursor: pointer;">Hiển thị toàn bộ quy trình</label>
                    </div>
                    
                    <button class="btn btn-outline-light btn-sm" id="btn-load-data">
                        <i class="fa-solid fa-file-import me-1"></i> Nạp JSON Quy trình
                    </button>
                    <input type="file" id="file-upload" accept=".json" class="d-none">
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container" style="margin-top: 80px; margin-bottom: 50px;">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-navy">HỆ THỐNG CHECKLIST PHÁP LÝ DỰ ÁN KHOÁNG SẢN</h2>
                    <p class="text-muted">Áp dụng cho mỏ cát/đá theo Luật Địa chất Khoáng sản 2025 và Nghị định 66</p>
                </div>
                
                <!-- AI Config Section -->
                <div class="ai-config-section p-3 mb-4 bg-white rounded border shadow-sm">
                    <div class="row align-items-center">
                        <div class="col-md-12 mb-3 d-flex justify-content-between align-items-center">
                            <h5 class="text-primary fw-bold m-0"><i class="fa-solid fa-robot me-2"></i> Trợ lý AI Trích xuất Luật</h5>
                        </div>
                        <div class="col-md-5 mb-2 mb-md-0">
                            <div class="input-group input-group-sm mb-1">
                                <span class="input-group-text bg-light"><i class="fa-solid fa-key"></i></span>
                                <input type="password" id="gemini-api-key" class="form-control" placeholder="Nhập Google Gemini API Key...">
                                <button class="btn btn-outline-primary" type="button" id="btn-save-key">Lưu</button>
                            </div>
                            <div class="input-group input-group-sm">
                                <span class="input-group-text bg-light"><i class="fa-solid fa-microchip"></i></span>
                                <select id="gemini-model-select" class="form-select">
                                    <option value="gemini-2.5-flash">Gemini 2.5 Flash (Nhanh)</option>
                                    <option value="gemini-1.5-pro">Gemini 1.5 Pro (Ổn định/Chuyên sâu)</option>
                                </select>
                            </div>
                            <small class="text-muted" style="font-size: 0.75rem;">(Lưu cục bộ trên trình duyệt)</small>
                        </div>
                        <div class="col-md-7 d-flex align-items-center justify-content-end gap-3 flex-wrap">
                            <span id="law-status" class="badge bg-secondary p-2"><i class="fa-solid fa-database me-1"></i> Dữ liệu luật: 0 file</span>
                            <button class="btn btn-primary btn-sm" id="btn-upload-law">
                                <i class="fa-solid fa-book-open-reader me-1"></i> Nạp Kho Luật
                            </button>
                            <button class="btn btn-outline-danger btn-sm" id="btn-clear-law" title="Xóa toàn bộ kho luật đã nạp">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                            <input type="file" id="file-upload-law" accept=".txt,.json" class="d-none" multiple>
                        </div>
                    </div>
                </div>

                <!-- Filters Section -->
                <div class="filter-section p-3 mb-4 bg-white rounded border shadow-sm">
                    <div class="row align-items-center">
                        <div class="col-md-auto mb-2 mb-md-0 fw-semibold">
                            <i class="fa-solid fa-filter text-muted me-1"></i> Bộ lọc nhanh:
                        </div>
                        <div class="col-md-4 mb-2 mb-md-0">
                            <select class="form-select form-select-sm" id="filter-responsible">
                                <option value="ALL">-- Tất cả bên chịu trách nhiệm --</option>
                                <!-- Tùy chọn sẽ được sinh tự động bằng JS -->
                            </select>
                        </div>
                        <div class="col-md-4">
                            <select class="form-select form-select-sm" id="filter-agency">
                                <option value="ALL">-- Tất cả cơ quan tiếp nhận --</option>
                                <!-- Tùy chọn sẽ được sinh tự động bằng JS -->
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Steps Container -->
                <div id="steps-container" class="steps-container">
                    <!-- Steps will be injected here by JS -->
                </div>
                
                <div class="text-center mt-4">
                    <button id="btn-reset" class="btn btn-outline-danger btn-sm">
                        <i class="fa-solid fa-rotate-left"></i> Đặt lại tiến độ
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- App JS -->
    <script type="module" src="app.js"></script>
</body>
</html>
