<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Checklist Pháp lý Cuốn chiếu - Dự án Khoáng sản</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar & Toolbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-navy fixed-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#"><i class="fa-solid fa-clipboard-check me-2"></i>Checklist Khoáng Sản</a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-toggle="collapse" data-bs-target="#toolbar" aria-controls="toolbar" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="toolbar">
                <div class="d-flex align-items-center flex-grow-1 mx-lg-4 my-2 my-lg-0">
                    <span class="text-white me-2 fw-semibold text-nowrap">Tiến độ:</span>
                    <div class="progress flex-grow-1" style="height: 20px; background-color: rgba(255,255,255,0.2);">
                        <div id="overall-progress" class="progress-bar bg-success progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">0%</div>
                    </div>
                </div>

                <div class="d-flex align-items-center gap-3">
                    <div class="form-check form-switch text-white m-0 d-flex align-items-center">
                        <input class="form-check-input me-2 mt-0" type="checkbox" role="switch" id="bypass-switch" style="cursor: pointer; width: 2.5em; height: 1.25em;">
                        <label class="form-check-label" for="bypass-switch" style="cursor: pointer;">Chế độ xem toàn bộ quy trình</label>
                    </div>
                    
                    <button class="btn btn-outline-light btn-sm" id="btn-load-data">
                        <i class="fa-solid fa-file-import me-1"></i> Nạp dữ liệu
                    </button>
                    <input type="file" id="file-upload" accept=".json" class="d-none">
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container" style="margin-top: 80px; margin-bottom: 50px;">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-navy">HỆ THỐNG CHECKLIST PHÁP LÝ DỰ ÁN KHOÁNG SẢN</h2>
                    <p class="text-muted">Áp dụng cho mỏ cát/đá theo Luật Địa chất Khoáng sản 2025 và Nghị định 66</p>
                </div>

                <!-- Steps Container -->
                <div id="steps-container" class="steps-container">
                    <!-- Steps will be injected here by JS -->
                </div>
                
                <div class="text-center mt-4">
                    <button id="btn-reset" class="btn btn-outline-danger btn-sm">
                        <i class="fa-solid fa-rotate-left"></i> Đặt lại tiến độ
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- App JS -->
    <script src="app.js"></script>
</body>
</html>
